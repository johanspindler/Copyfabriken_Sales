<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pipeline - Copyfabriken</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Open+Sans:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #F5C800;
    --yellow-light: #FFF8CC;
    --dark: #1A1A1A;
    --gray: #6B6B6B;
    --light-gray: #F2F2F2;
    --border: #E0E0E0;
    --white: #fff;
    --green: #2E7D32;
    --green-light: #E8F5E9;
    --red: #C62828;
    --red-light: #FFEBEE;
    --orange: #E65100;
    --orange-light: #FFF3E0;
    --blue: #1565C0;
    --blue-light: #E3F2FD;
    --purple: #6A1B9A;
    --purple-light: #F3E5F5;
  }

  body {
    font-family: 'Open Sans', sans-serif;
    background: var(--light-gray);
    color: var(--dark);
    min-height: 100vh;
  }

  header {
    background: #FDCB0A;
    padding: 0 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid #e0b400;
  }

  .logo-img {
    height: 52px;
    width: auto;
    display: block;
  }

  .header-subtitle {
    color: var(--dark);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.55;
  }

  .main {
    padding: 32px 24px 60px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .toolbar-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .filter-btn {
    border: 1.5px solid var(--border);
    background: var(--white);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Open Sans', sans-serif;
  }

  .filter-btn.active, .filter-btn:hover {
    background: #FDCB0A;
    border-color: var(--yellow);
    color: var(--dark);
  }

  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--white);
    border-radius: 10px;
    padding: 14px 22px;
    border: 1.5px solid var(--border);
    min-width: 160px;
  }

  .stat-value {
    font-family: 'Abril Fatface', serif;
    font-size: 26px;
    color: var(--dark);
    line-height: 1.1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 700;
    margin-top: 2px;
  }

  .table-wrap {
    background: var(--white);
    border-radius: 12px;
    border: 1.5px solid var(--border);
    overflow: auto;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    background: var(--dark);
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 12px 14px;
    text-align: left;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 2;
  }

  thead th:first-child { border-radius: 0; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: default;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #FAFAFA; }

  tbody td {
    padding: 11px 14px;
    vertical-align: top;
    line-height: 1.45;
  }

  .client-name {
    font-weight: 700;
    color: var(--dark);
    font-size: 13px;
  }

  .contact-name {
    font-weight: 600;
    color: var(--dark);
    font-size: 12px;
  }

  .contact-sub {
    font-size: 11px;
    color: var(--gray);
    margin-top: 2px;
  }

  .contact-sub a {
    color: var(--gray);
    text-decoration: none;
  }

  .contact-sub a:hover { color: var(--dark); text-decoration: underline; }

  .project-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--dark);
  }

  .services {
    font-size: 11px;
    color: var(--gray);
    max-width: 160px;
  }

  .date-cell {
    font-size: 11px;
    color: var(--gray);
    white-space: nowrap;
  }

  .status-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .pill-sent      { background: var(--blue-light);   color: var(--blue); }
  .pill-accepted  { background: var(--green-light);  color: var(--green); }
  .pill-declined  { background: var(--red-light);    color: var(--red); }
  .pill-ongoing   { background: var(--yellow-light); color: #8a7000; }
  .pill-pending   { background: var(--orange-light); color: var(--orange); }
  .pill-prospect  { background: var(--purple-light); color: var(--purple); }

  .amount {
    font-weight: 700;
    font-size: 12px;
    color: var(--dark);
    white-space: nowrap;
  }

  .amount-note {
    font-size: 10px;
    color: var(--gray);
    font-weight: 400;
    display: block;
  }

  .no-data {
    color: #bbb;
    font-size: 11px;
  }

  .icon-check { color: var(--green); font-size: 14px; }
  .icon-x     { color: var(--red);   font-size: 14px; }

  .note-cell {
    font-size: 11px;
    color: var(--gray);
    max-width: 180px;
    line-height: 1.5;
  }

  footer {
    text-align: center;
    color: #bbb;
    font-size: 11px;
    margin-top: 40px;
    padding-bottom: 20px;
  }

  @media (max-width: 900px) {
    .main { padding: 16px 6px 40px; }
    .stats-row { gap: 8px; }
  }
</style>
</head>

const statusConfig = {
  accepted:  { label: "Accepterad",     cls: "pill-accepted"  },
  sent:      { label: "Offert skickad", cls: "pill-sent"       },
  ongoing:   { label: "Pågående",       cls: "pill-ongoing"    },
  prospect:  { label: "Prospekt",       cls: "pill-prospect"   },
  declined:  { label: "Ej intresserad", cls: "pill-declined"   },
  pending:   { label: "Uppskjutet",     cls: "pill-pending"    }
};

function formatDate(str) {
  if (!str) return '<span class="no-data">-</span>';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.toLocaleDateString('sv-SE', { year: 'numeric', month: 'short', day: 'numeric' });
}

function renderTable(filter) {
  const tbody = document.getElementById('pipeline-body');
  const rows = filter === 'all' ? data : data.filter(r => r.status === filter);

  tbody.innerHTML = rows.map((r, i) => {
    const s = statusConfig[r.status] || { label: r.status, cls: '' };
    const contactLines = [
      r.contact.name ? `<div class="contact-name">${r.contact.name}</div>` : '',
      r.contact.title ? `<div class="contact-sub">${r.contact.title}</div>` : '',
      r.contact.email ? `<div class="contact-sub"><a href="mailto:${r.contact.email}">${r.contact.email}</a></div>` : '',
      r.contact.phone ? `<div class="contact-sub">${r.contact.phone}</div>` : ''
    ].join('');

    return `<tr data-status="${r.status}">
      <td style="color:#bbb;font-size:11px;font-weight:700;">${String(i+1).padStart(2,'0')}</td>
      <td><div class="client-name">${r.client}</div></td>
      <td>${contactLines || '<span class="no-data">-</span>'}</td>
      <td><div class="project-name">${r.project}</div></td>
      <td><div class="services">${r.services}</div></td>
      <td class="date-cell">${formatDate(r.start)}</td>
      <td class="date-cell">${formatDate(r.end)}</td>
      <td class="date-cell">${formatDate(r.quote_date)}</td>
      <td>
        ${r.amount ? `<div class="amount">${r.amount}</div>` : '<span class="no-data">-</span>'}
        ${r.amount_note ? `<span class="amount-note">${r.amount_note}</span>` : ''}
      </td>
      <td><span class="status-pill ${s.cls}">${s.label}</span></td>
      <td><div class="note-cell">${r.notes}</div></td>
    </tr>`;
  }).join('');

  renderStats(rows);
}

function renderStats(rows) {
  const total = rows.length;
  const accepted = rows.filter(r => r.status === 'accepted').length;
  const sent = rows.filter(r => r.status === 'sent').length;
  const ongoing = rows.filter(r => r.status === 'ongoing').length;
  const prospects = rows.filter(r => r.status === 'prospect').length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${total}</div>
      <div class="stat-label">Totalt kunder</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--green)">${accepted}</div>
      <div class="stat-label">Accepterade</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--blue)">${sent}</div>
      <div class="stat-label">Offert skickad</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:#8a7000">${ongoing}</div>
      <div class="stat-label">Pågående</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--purple)">${prospects}</div>
      <div class="stat-label">Prospekt</div>
    </div>
  `;
}

function filterTable(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(filter);
}

renderTable('all');
</script>
